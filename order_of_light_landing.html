<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="The Order of Light. The signal has always been there.">
<meta property="og:title" content="The Order of Light">
<meta property="og:description" content="The signal has always been there.">
<meta property="og:type" content="website">
<title>The Order of Light</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@200;300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --void: #0A0A0A;
  --crimson: #8B1A2E;
  --gold: #C8A96E;
  --gold-dim: #8A6E3E;
  --parchment: #E8E0D0;
  --white: #F5F0E8;
}

html, body {
  width: 100%; height: 100%;
  background: var(--void);
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  color: var(--white);
  cursor: default;
}

/* ── GRAIN ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 100;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity: 0.5;
}

/* ── SCAN LINES ── */
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 99;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
  );
}

/* ── RADIAL GLOW ── */
.bg-glow {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background: radial-gradient(ellipse at 50% 48%, rgba(139,26,46,0.13) 0%, transparent 62%);
  animation: glowPulse 8s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── MAIN LAYOUT ── */
.stage {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 48px 32px;
  gap: 0;
}

/* ── MARK ── */
.mark-wrap {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 52px;
}

.mark-rings {
  position: absolute;
  width: 200px; height: 200px;
  pointer-events: none;
}

.ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(139,26,46,0);
  animation: ringPulse 6s ease-out infinite;
}
.ring:nth-child(1) { animation-delay: 0s; }
.ring:nth-child(2) { animation-delay: 2s; }
.ring:nth-child(3) { animation-delay: 4s; }

@keyframes ringPulse {
  0% { transform: scale(0.4); border-color: rgba(139,26,46,0.5); opacity: 1; }
  100% { transform: scale(1.8); border-color: rgba(139,26,46,0); opacity: 0; }
}

.mark-svg {
  position: relative; z-index: 2;
  animation: markBreathe 7s ease-in-out infinite;
  filter: drop-shadow(0 0 18px rgba(139,26,46,0.35));
}

@keyframes markBreathe {
  0%,100% { opacity: 1; filter: drop-shadow(0 0 18px rgba(139,26,46,0.35)); }
  50% { opacity: 0.75; filter: drop-shadow(0 0 8px rgba(139,26,46,0.15)); }
}

/* Occasional glitch on the mark */
@keyframes markGlitch {
  0%,96%,100% { transform: translate(0,0); clip-path: none; }
  97% { transform: translate(-2px, 0); clip-path: inset(20% 0 60% 0); }
  98% { transform: translate(2px, 0); clip-path: inset(60% 0 20% 0); }
  99% { transform: translate(0, 1px); clip-path: none; }
}
.mark-svg { animation: markBreathe 7s ease-in-out infinite, markGlitch 14s steps(1) infinite; }

/* ── WORDMARK ── */
.wordmark {
  font-family: 'DM Sans', sans-serif; font-weight: 200;
  font-size: clamp(9px, 1.2vw, 12px);
  letter-spacing: 0.45em; text-transform: uppercase;
  color: rgba(196,184,154,0.5);
  margin-bottom: 20px;
  animation: fadeUp 2s ease 0.6s both;
}

/* ── TAGLINE ── */
.tagline {
  font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
  font-size: clamp(18px, 2.8vw, 28px);
  color: var(--white);
  letter-spacing: 0.04em;
  text-align: center;
  line-height: 1.4;
  margin-bottom: 56px;
  animation: fadeUp 2s ease 0.9s both;
}

/* ── DIVIDER ── */
.divider {
  width: 1px; height: 44px;
  background: linear-gradient(to bottom, var(--crimson), transparent);
  margin-bottom: 40px;
  animation: fadeUp 2s ease 1.1s both;
}

/* ── EMAIL FORM ── */
.signal-form {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  margin-bottom: 48px;
  animation: fadeUp 2s ease 1.3s both;
  width: 100%; max-width: 360px;
}

.signal-label {
  font-size: clamp(8px, 1vw, 9.5px);
  letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--crimson);
}

.signal-input-row {
  display: flex; width: 100%; gap: 0;
}

.signal-input {
  flex: 1;
  background: transparent;
  border: 1px solid rgba(139,26,46,0.35);
  border-right: none;
  padding: 11px 16px;
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  font-size: 12px; letter-spacing: 0.1em;
  color: var(--white);
  outline: none;
  transition: border-color 0.3s;
  -webkit-appearance: none;
}
.signal-input::placeholder { color: rgba(245,240,232,0.2); letter-spacing: 0.15em; font-size: 11px; }
.signal-input:focus { border-color: rgba(139,26,46,0.7); }

.signal-btn {
  background: var(--crimson);
  border: 1px solid var(--crimson);
  padding: 11px 20px;
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--white); cursor: pointer;
  transition: background 0.3s, letter-spacing 0.3s;
  white-space: nowrap;
}
.signal-btn:hover { background: #A82035; letter-spacing: 0.4em; }

.signal-note {
  font-size: 9px; letter-spacing: 0.15em;
  color: rgba(245,240,232,0.2);
  text-align: center;
}

/* Success state */
.signal-success {
  display: none;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 16px; color: var(--gold);
  text-align: center; letter-spacing: 0.05em;
  animation: fadeUp 0.8s ease both;
}

/* ── SOCIAL LINKS ── */
.socials {
  display: flex; align-items: center; gap: 32px;
  animation: fadeUp 2s ease 1.6s both;
  margin-bottom: 0;
}

.social-link {
  font-size: 8.5px; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(245,240,232,0.25);
  text-decoration: none;
  transition: color 0.3s;
  position: relative;
}
.social-link::after {
  content: '';
  position: absolute; bottom: -3px; left: 0; right: 0;
  height: 1px; background: var(--crimson);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s;
}
.social-link:hover { color: rgba(245,240,232,0.65); }
.social-link:hover::after { transform: scaleX(1); }

.social-sep {
  width: 3px; height: 3px;
  background: rgba(139,26,46,0.4);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* ── AUDIO TOGGLE ── */
.audio-toggle {
  position: fixed; bottom: 32px; right: 36px; z-index: 50;
  background: transparent; border: 1px solid rgba(139,26,46,0.3);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; transition: border-color 0.3s;
  animation: fadeUp 2s ease 2s both;
}
.audio-toggle:hover { border-color: rgba(139,26,46,0.7); }
.audio-bars {
  display: flex; align-items: flex-end; gap: 2px; height: 14px;
}
.audio-bar {
  width: 2px; background: var(--crimson); border-radius: 0;
  transform-origin: bottom;
}
.audio-bar:nth-child(1) { height: 5px; animation: none; }
.audio-bar:nth-child(2) { height: 9px; animation: none; }
.audio-bar:nth-child(3) { height: 14px; animation: none; }
.audio-bar:nth-child(4) { height: 7px; animation: none; }
.audio-bar:nth-child(5) { height: 11px; animation: none; }

.audio-bars.playing .audio-bar:nth-child(1) { animation: bar1 0.9s ease-in-out infinite alternate; }
.audio-bars.playing .audio-bar:nth-child(2) { animation: bar2 0.7s ease-in-out infinite alternate; }
.audio-bars.playing .audio-bar:nth-child(3) { animation: bar3 1.1s ease-in-out infinite alternate; }
.audio-bars.playing .audio-bar:nth-child(4) { animation: bar4 0.8s ease-in-out infinite alternate; }
.audio-bars.playing .audio-bar:nth-child(5) { animation: bar5 1.0s ease-in-out infinite alternate; }

@keyframes bar1 { from{height:3px} to{height:10px} }
@keyframes bar2 { from{height:6px} to{height:14px} }
@keyframes bar3 { from{height:8px} to{height:4px} }
@keyframes bar4 { from{height:4px} to{height:12px} }
@keyframes bar5 { from{height:9px} to{height:5px} }

.audio-label {
  font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(245,240,232,0.3);
}

/* ── TRANSMISSION COUNTER ── */
.tx-counter {
  position: fixed; top: 28px; left: 36px; z-index: 50;
  font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(139,26,46,0.5);
  animation: fadeUp 2s ease 2.2s both;
}
.tx-counter span { color: rgba(139,26,46,0.8); }

/* ── VHS TIMESTAMP ── */
.vhs-time {
  position: fixed; bottom: 32px; left: 36px; z-index: 50;
  font-family: monospace; font-size: 11px;
  color: rgba(139,26,46,0.35);
  letter-spacing: 0.1em;
  animation: fadeUp 2s ease 2.2s both;
}

/* ── FADE UP KEYFRAMES ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── OCCASIONAL FULL-PAGE GLITCH ── */
.glitch-overlay {
  position: fixed; inset: 0; z-index: 200; pointer-events: none;
  opacity: 0;
}
.glitch-overlay.flash {
  animation: pageGlitch 0.18s steps(1) forwards;
}
@keyframes pageGlitch {
  0% { opacity: 0; }
  20% { opacity: 1; background: rgba(139,26,46,0.04); clip-path: inset(30% 0 50% 0); transform: translateX(-3px); }
  40% { opacity: 1; background: rgba(139,26,46,0.02); clip-path: inset(60% 0 10% 0); transform: translateX(2px); }
  60% { opacity: 1; background: transparent; clip-path: inset(10% 0 80% 0); transform: translateX(-1px); }
  100% { opacity: 0; transform: translateX(0); }
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  .stage { padding: 32px 24px; }
  .mark-wrap { margin-bottom: 36px; }
  .mark-rings { width: 150px; height: 150px; }
  .tagline { margin-bottom: 36px; font-size: 18px; }
  .divider { margin-bottom: 28px; }
  .signal-form { margin-bottom: 32px; }
  .socials { gap: 20px; }
  .audio-toggle { bottom: 20px; right: 20px; }
  .vhs-time { bottom: 20px; left: 20px; font-size: 10px; }
  .tx-counter { top: 20px; left: 20px; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="glitch-overlay" id="glitchOverlay"></div>

<!-- VHS-style UI elements -->
<div class="tx-counter">Signal · <span id="txStatus">Locating</span></div>
<div class="vhs-time" id="vhsTime">00:00:00</div>

<!-- MAIN STAGE -->
<div class="stage">

  <!-- ANIMATED MARK -->
  <div class="mark-wrap">
    <div class="mark-rings">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <svg class="mark-svg" width="108" height="108" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="13" y1="13" x2="87" y2="87" stroke="#8B1A2E" stroke-width="8.5" stroke-linecap="square"/>
      <line x1="87" y1="13" x2="13" y2="87" stroke="#8B1A2E" stroke-width="8.5" stroke-linecap="square"/>
      <line x1="50" y1="50" x2="50" y2="91" stroke="#8B1A2E" stroke-width="7" stroke-linecap="square"/>
      <line x1="50" y1="8" x2="50" y2="31" stroke="#8B1A2E" stroke-width="7" stroke-linecap="square"/>
      <line x1="8" y1="50" x2="31" y2="50" stroke="#8B1A2E" stroke-width="7" stroke-linecap="square"/>
      <line x1="69" y1="50" x2="92" y2="50" stroke="#8B1A2E" stroke-width="7" stroke-linecap="square"/>
    </svg>
  </div>

  <!-- WORDMARK -->
  <div class="wordmark">The Order of Light</div>

  <!-- TAGLINE -->
  <div class="tagline">The signal has always been there.</div>

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- EMAIL CAPTURE -->
  <div class="signal-form" id="signalForm">
    <div class="signal-label">Join the Illuminated</div>
    <div class="signal-input-row">
      <input
        class="signal-input"
        type="email"
        id="emailInput"
        placeholder="your frequency"
        autocomplete="email"
        spellcheck="false"
      />
      <button class="signal-btn" id="signalBtn" onclick="handleSignup()">Receive</button>
    </div>
    <div class="signal-note">The Order contacts those who are ready.</div>
  </div>

  <div class="signal-success" id="signalSuccess">
    You have been found. ◈
  </div>

  <!-- SOCIAL LINKS -->
  <div class="socials">
    <a href="https://instagram.com/theorderoflight" target="_blank" class="social-link">Instagram</a>
    <div class="social-sep"></div>
    <a href="https://facebook.com/theorderoflight" target="_blank" class="social-link">Facebook</a>
    <div class="social-sep"></div>
    <a href="https://threads.net/@theorderoflight" target="_blank" class="social-link">Threads</a>
    <div class="social-sep"></div>
    <a href="https://youtube.com/@theorderoflight" target="_blank" class="social-link">YouTube</a>
  </div>

</div><!-- end stage -->

<!-- AUDIO TOGGLE -->
<button class="audio-toggle" id="audioToggle" onclick="toggleAudio()" aria-label="Toggle ambient audio">
  <div class="audio-bars" id="audioBars">
    <div class="audio-bar"></div>
    <div class="audio-bar"></div>
    <div class="audio-bar"></div>
    <div class="audio-bar"></div>
    <div class="audio-bar"></div>
  </div>
  <span class="audio-label" id="audioLabel">Signal</span>
</button>

<script>
// ── AUDIO ENGINE ──────────────────────────────────────────────────────────
let audioCtx = null;
let masterGain = null;
let isPlaying = false;
let nodes = [];

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);
}

function buildAmbience() {
  if (!audioCtx) return;
  nodes.forEach(n => { try { n.stop(); } catch(e){} });
  nodes = [];

  // Deep sub tone — 40hz felt more than heard
  const sub = audioCtx.createOscillator();
  const subGain = audioCtx.createGain();
  sub.type = 'sine';
  sub.frequency.setValueAtTime(40, audioCtx.currentTime);
  subGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  sub.connect(subGain);
  subGain.connect(masterGain);
  sub.start();
  nodes.push(sub);

  // Mid drone — 80hz with slow LFO movement
  const drone = audioCtx.createOscillator();
  const droneGain = audioCtx.createGain();
  const droneLFO = audioCtx.createOscillator();
  const droneLFOGain = audioCtx.createGain();
  drone.type = 'triangle';
  drone.frequency.setValueAtTime(80, audioCtx.currentTime);
  droneGain.gain.setValueAtTime(0.07, audioCtx.currentTime);
  droneLFO.frequency.setValueAtTime(0.08, audioCtx.currentTime);
  droneLFOGain.gain.setValueAtTime(6, audioCtx.currentTime);
  droneLFO.connect(droneLFOGain);
  droneLFOGain.connect(drone.frequency);
  drone.connect(droneGain);
  droneGain.connect(masterGain);
  drone.start(); droneLFO.start();
  nodes.push(drone, droneLFO);

  // High shimmer — 1200hz sine, very quiet, slow tremolo
  const shimmer = audioCtx.createOscillator();
  const shimmerGain = audioCtx.createGain();
  const shimmerLFO = audioCtx.createOscillator();
  const shimmerLFOGain = audioCtx.createGain();
  shimmer.type = 'sine';
  shimmer.frequency.setValueAtTime(1200, audioCtx.currentTime);
  shimmerGain.gain.setValueAtTime(0.012, audioCtx.currentTime);
  shimmerLFO.frequency.setValueAtTime(0.15, audioCtx.currentTime);
  shimmerLFOGain.gain.setValueAtTime(0.01, audioCtx.currentTime);
  shimmerLFO.connect(shimmerLFOGain);
  shimmerLFOGain.connect(shimmerGain.gain);
  shimmer.connect(shimmerGain);
  shimmerGain.connect(masterGain);
  shimmer.start(); shimmerLFO.start();
  nodes.push(shimmer, shimmerLFO);

  // White noise static — extremely subtle
  const bufferSize = audioCtx.sampleRate * 4;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.setValueAtTime(400, audioCtx.currentTime);
  noiseFilter.Q.setValueAtTime(0.3, audioCtx.currentTime);
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(0.018, audioCtx.currentTime);
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(masterGain);
  noise.start();
  nodes.push(noise);
}

function toggleAudio() {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const bars = document.getElementById('audioBars');
  const label = document.getElementById('audioLabel');

  if (!isPlaying) {
    buildAmbience();
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 2.5);
    bars.classList.add('playing');
    label.textContent = 'Receiving';
    isPlaying = true;
  } else {
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
    setTimeout(() => {
      nodes.forEach(n => { try { n.stop(); } catch(e){} });
      nodes = [];
    }, 1600);
    bars.classList.remove('playing');
    label.textContent = 'Signal';
    isPlaying = false;
  }
}

// ── EMAIL SIGNUP ──────────────────────────────────────────────────────────
function handleSignup() {
  const input = document.getElementById('emailInput');
  const form = document.getElementById('signalForm');
  const success = document.getElementById('signalSuccess');
  const email = input.value.trim();

  if (!email || !email.includes('@')) {
    input.style.borderColor = 'rgba(139,26,46,0.8)';
    input.focus();
    setTimeout(() => { input.style.borderColor = 'rgba(139,26,46,0.35)'; }, 1200);
    return;
  }

  // In production: replace with your email service (Mailchimp, ConvertKit, etc.)
  // For now: stores locally and shows success state
  const list = JSON.parse(localStorage.getItem('illuminated') || '[]');
  if (!list.includes(email)) list.push(email);
  localStorage.setItem('illuminated', JSON.stringify(list));

  form.style.opacity = '0';
  form.style.transition = 'opacity 0.6s ease';
  setTimeout(() => {
    form.style.display = 'none';
    success.style.display = 'block';
    triggerGlitch();
  }, 600);
}

document.getElementById('emailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSignup();
});

// ── VHS TIMESTAMP ─────────────────────────────────────────────────────────
function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('vhsTime').textContent = `${h}:${m}:${s}`;
}
setInterval(updateTime, 1000);
updateTime();

// ── TX STATUS CYCLING ─────────────────────────────────────────────────────
const txStates = ['Locating', 'Scanning', 'Receiving', 'Processing', 'Transmitting', 'Found'];
let txIndex = 0;
function cycleTx() {
  txIndex = (txIndex + 1) % txStates.length;
  const el = document.getElementById('txStatus');
  el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = txStates[txIndex];
    el.style.opacity = '1';
    el.style.transition = 'opacity 0.4s';
  }, 200);
}
setInterval(cycleTx, 3800);

// ── GLITCH ────────────────────────────────────────────────────────────────
function triggerGlitch() {
  const overlay = document.getElementById('glitchOverlay');
  overlay.classList.remove('flash');
  void overlay.offsetWidth;
  overlay.classList.add('flash');
  setTimeout(() => overlay.classList.remove('flash'), 200);
}
// Occasional random glitch
setInterval(() => {
  if (Math.random() > 0.7) triggerGlitch();
}, 11000);

// ── PAGE ENTRY GLITCH ─────────────────────────────────────────────────────
setTimeout(() => triggerGlitch(), 1800);
</script>
</body>
</html>
